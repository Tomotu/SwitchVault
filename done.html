<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwitchVault — Done</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="preload" href="data.js" as="script">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%23111110'/%3E%3Crect x='10' y='46' width='42' height='100' rx='21' fill='%23A0453F'/%3E%3Ccircle cx='31' cy='68' r='10' fill='rgba(0,0,0,.3)'/%3E%3Crect x='50' y='20' width='92' height='152' rx='10' fill='%23282523'/%3E%3Crect x='60' y='32' width='72' height='128' rx='6' fill='%23141412'/%3E%3Cpolygon points='80,84 112,96 80,108' fill='%236A8A58' opacity='.9'/%3E%3Crect x='140' y='46' width='42' height='100' rx='21' fill='%236A8A58'/%3E%3Ccircle cx='161' cy='124' r='10' fill='rgba(0,0,0,.3)'/%3E%3C/svg%3E">
  <meta name="theme-color" content="#0E0E0D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ── HEADER ── */
    .d-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--s1); border-bottom: 1px solid var(--b1);
      padding: 14px clamp(12px,3vw,24px) 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .app-logo { flex-shrink: 0; opacity: .92; display: flex; align-items: center; }
    .d-heading {
      font-family: 'Anton', sans-serif; font-size: 22px;
      font-weight: 400; color: var(--txt); letter-spacing: .02em; flex: 1;
    }
    .d-theme-toggle {
      background: none; border: 1px solid var(--b2); border-radius: 6px;
      color: var(--txt2); cursor: pointer; font-size: 14px; padding: 4px 8px;
      transition: all .15s; flex-shrink: 0;
    }
    .d-theme-toggle:hover { background: var(--s3); color: var(--txt); }

    /* ── HERO STATS ── */
    .hero-stats {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 10px; padding: 16px clamp(12px,3vw,24px) 0;
      position: relative; z-index: 1;
    }
    @media (min-width: 480px) { .hero-stats { grid-template-columns: repeat(4, 1fr); } }
    .hstat {
      background: var(--s2); border: 1px solid var(--b1);
      border-radius: var(--r-lg); padding: 16px 16px 14px;
      text-align: center; position: relative; overflow: hidden;
      transition: background .12s, border-color .15s, box-shadow .15s;
    }
    .hstat::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--b2);
    }
    .hstat:hover { background: var(--s3); border-color: var(--b2); box-shadow: var(--shadow); }
    .hstat-n {
      font-family: 'Anton', sans-serif; font-size: 30px; font-weight: 400;
      color: var(--txt); line-height: 1; margin-bottom: 6px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .hstat-n.green { color: var(--teal); text-shadow: 0 0 20px rgba(106,138,88,.2); }
    .hstat-n.gold  { color: var(--gold); text-shadow: 0 0 20px rgba(200,168,112,.2); }
    .hstat-n.red   { color: var(--acc);  text-shadow: 0 0 20px rgba(160,69,63,.2); }
    .hstat-l { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--txt2); font-weight: 700; }

    /* ── SEARCH ── */
    .sbox {
      width: 100%; position: relative; display: flex; align-items: center;
    }
    .sbox-ico {
      position: absolute; left: 10px; font-size: 18px;
      color: var(--mut); pointer-events: none; line-height: 1;
    }
    .sbox input {
      width: 100%; background: var(--s2); border: 1px solid var(--b1);
      border-radius: 10px; color: var(--txt);
      font-size: 14px;
      padding: 9px 34px 9px 36px; outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .sbox input::placeholder { color: var(--mut); }
    .sbox input:focus { border-color: var(--b3); box-shadow: 0 0 0 3px rgba(106,138,88,.1); }
    .sbox-clear {
      position: absolute; right: 8px; background: none; border: none;
      color: var(--mut); cursor: pointer; font-size: 12px; padding: 4px;
      display: none;
    }
    .sbox-clear:hover { color: var(--txt); }

    /* ── SORT + FILTER BAR ── */
    .d-controls {
      padding: 14px clamp(12px,3vw,24px) 0;
      display: flex; flex-direction: column; gap: 0;
      position: relative; z-index: 1;
    }
    .d-sort-bar {
      display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none;
      border-bottom: 1px solid var(--b1); padding: 0;
    }
    .d-sort-bar::-webkit-scrollbar { display: none; }
    .sort-btn {
      background: none; border: none; border-bottom: 2px solid transparent;
      border-radius: 0; color: var(--txt2); cursor: pointer;
      font-size: 12px; font-weight: 500; padding: 8px 12px 10px;
      white-space: nowrap; transition: color .15s, border-color .15s;
      flex-shrink: 0; letter-spacing: .01em; margin-bottom: -1px;
    }
    .sort-btn:hover { color: var(--txt); }
    .sort-btn.on { color: var(--teal); border-bottom-color: var(--teal); font-weight: 700; }
    .sort-btn:active { opacity: .7; }

    .d-cats-row {
      display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px;
    }
    .d-cats-row::-webkit-scrollbar { display: none; }
    .chip {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: 20px; color: var(--txt2); cursor: pointer;
      font-size: 12px; font-weight: 500; padding: 5px 13px;
      white-space: nowrap; transition: all .15s; flex-shrink: 0;
    }
    .chip:hover { background: var(--s3); border-color: var(--b2); }
    .chip.on { background:rgba(106,138,88,.12); border-color:rgba(106,138,88,.28); color:var(--teal); }
    .chip:active { filter: brightness(.93); }

    /* ── BODY ── */
    .d-body {
      padding: 20px clamp(12px,3vw,24px) 24px;
      max-width: 720px;
      margin: 0 auto;
      position: relative; z-index: 1;
    }

    /* Month dividers */
    .d-month-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: var(--txt2); margin: 22px 0 12px;
    }
    .d-month-header:first-child { margin-top: 4px; }
    .d-month-header::after { content: ''; flex: 1; height: 1px; background: var(--b1); }
    .d-month-count {
      font-size: 10px; font-weight: 600; color: var(--mut);
      background: var(--s2); border: 1px solid var(--b1);
      border-radius: 10px; padding: 1px 7px; letter-spacing: 0;
    }

    /* Cards */
    .d-card {
      background: var(--s2); border: 1px solid var(--b1);
      border-radius: var(--r-lg); margin-bottom: 12px;
      display: flex; overflow: hidden;
      transition: background .12s, border-color .15s, box-shadow .15s, transform .1s;
    }
    .d-card:hover { background: var(--s3); border-color: var(--b2); box-shadow: 0 4px 24px rgba(0,0,0,.22); }
    .d-card:active { transform: scale(.998); }
    .d-card-edge { width: 5px; flex-shrink: 0; background: var(--teal); }
    .d-card-main { flex: 1; padding: 14px 16px 12px; min-width: 0; }
    .d-card-title {
      font-size: 15px; font-weight: 600; color: var(--txt);
      margin-bottom: 8px; line-height: 1.4;
    }
    .d-card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 9px; }
    .d-card-date {
      font-size: 10px; color: var(--txt2); margin-bottom: 9px; font-weight: 500;
    }
    .d-card-meta { display: flex; gap: 6px; align-items: center; margin-bottom: 9px; flex-wrap: wrap; }
    .d-dur-badge {
      font-size: 9px; font-weight: 700; letter-spacing: .05em;
      text-transform: uppercase; border-radius: 4px; padding: 2px 6px; border: 1px solid;
    }
    .d-dur-badge.quick  { color:var(--teal); background:rgba(106,138,88,.1);  border-color:rgba(106,138,88,.25); }
    .d-dur-badge.medium { color:var(--gold); background:rgba(200,168,112,.1); border-color:rgba(200,168,112,.25); }
    .d-dur-badge.full   { color:var(--acc);  background:rgba(160,69,63,.08);  border-color:rgba(160,69,63,.2); }
    .d-sched-badge {
      font-size: 9px; font-weight: 700; letter-spacing: .04em;
      text-transform: uppercase; color: var(--txt2);
      background: var(--s1); border: 1px solid var(--b2);
      border-radius: 4px; padding: 2px 6px;
    }

    /* Stats entry */
    .vstats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
    .vstats-field { display:flex; flex-direction:column; gap:4px; }
    .vstats-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--txt2); }
    .vstats-input {
      width:100%; background:var(--s1); border:1px solid var(--b1);
      border-radius:6px; color:var(--txt);
      font-size:13px; padding:6px 9px; outline:none;
      transition:border-color .15s, box-shadow .15s;
    }
    .vstats-input:focus { border-color:var(--teal); box-shadow: 0 0 0 3px rgba(106,138,88,.1); }
    .vstats-total-row {
      grid-column:1/-1; font-size:10px; color:var(--txt2);
      padding-top:6px; border-top:1px solid var(--b1); margin-top:2px;
      font-weight: 600; letter-spacing: .03em;
    }

    .d-card-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
    .d-btn {
      background: var(--s1); border: 1px solid var(--b2); border-radius: 8px;
      color: var(--txt2); cursor: pointer; font-size: 12px; font-weight: 600;
      padding: 7px 15px; white-space: nowrap; transition: all .15s; letter-spacing: .02em;
    }
    .d-btn:hover { background: var(--s3); color: var(--txt); border-color: var(--b3); }
    .d-btn:active { filter: brightness(.9); transform: scale(.97); }

    /* Empty state */
    .d-empty {
      text-align: center; color: var(--txt2); font-size: 13px;
      padding: 64px 24px; line-height: 1.9; position: relative; z-index: 1;
    }
    .d-empty-ico { font-size: 44px; margin-bottom: 16px; }
    .d-empty-title { font-size: 16px; font-weight: 600; color: var(--txt); margin-bottom: 8px; }
    .d-empty-cta {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 20px; background: var(--teal); border: none; border-radius: 10px;
      color: #fff; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      padding: 12px 24px; cursor: pointer; text-decoration: none;
      transition: opacity .15s;
    }
    .d-empty-cta:hover { opacity: .85; }

    /* ── BOTTOM NAV ── */
    .bnav-btn.active { color: var(--teal); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--s3); border: 1px solid var(--b3); color: var(--txt);
      border-radius: 20px; padding: 9px 18px; font-size: 13px; font-weight: 500;
      pointer-events: none; opacity: 0; visibility: hidden;
      transition: opacity .22s var(--ease), transform .22s var(--ease), visibility .22s;
      white-space: nowrap; z-index: 500; box-shadow: 0 4px 20px rgba(0,0,0,.35);
    }
    .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

    /* ── LIGHT MODE ── */
    html.light .vstats-input { background: var(--s2); }

    /* ── FADE IN ── */
    .hero-stats, .d-controls, .d-body, .toast { animation: fadeIn .25s ease both; }
    .hero-stats { animation-delay: .05s; }
    .d-controls { animation-delay: .08s; }
    .d-body { animation-delay: .1s; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .d-header { padding: 10px 12px; }
      .d-heading { font-size: 17px; }
      .app-logo { display: none; }
      .d-body { padding: 12px 12px 24px; }
      .d-btn { padding: 9px 14px; font-size: 12px; min-height: 38px; }
      .d-card-main { padding: 12px 14px; }
      .d-card-title { font-size: 13px; }
    }

    @media (min-width: 768px) {
      .d-sort-bar, .d-cats-row {
        overflow-x: visible;
        flex-wrap: wrap;
      }
    }

    @media (min-width: 900px) {
      .d-body { max-width: 1120px; padding-bottom: 80px; }
      .d-header { max-width: 1120px; margin: 0 auto; }
      .d-controls { max-width: 1120px; margin-left: auto; margin-right: auto; }
      .hero-stats { max-width: 1120px; margin-left: auto; margin-right: auto; }
      #d-body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        align-items: start;
      }
      #d-body .d-card { margin-bottom: 0; }
      .d-empty { grid-column: 1 / -1; }
    }

  </style>
</head>
<body>

  <!-- Header -->
  <div class="d-header">
    <div class="app-logo" title="SwitchVault">
      <svg viewBox="0 0 40 26" width="30" height="19" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="3" width="11" height="20" rx="5.5" fill="#A0453F"/>
        <circle cx="5.5" cy="9" r="2" fill="rgba(0,0,0,.3)"/>
        <rect x="10" y="0" width="20" height="26" rx="2" fill="#282523"/>
        <rect x="12" y="3" width="16" height="20" rx="1.5" fill="#141412"/>
        <polygon points="17.5,10.5 23.5,13 17.5,15.5" fill="#6A8A58" opacity=".9"/>
        <rect x="29" y="3" width="11" height="20" rx="5.5" fill="#6A8A58"/>

  <!-- Controls -->
  <div class="d-controls">
    <div class="sbox">
      <span class="sbox-ico">⌕</span>
      <input id="d-search" type="text" placeholder="Search done videos…" autocomplete="off" spellcheck="false"/>

    </div>
    <div class="d-sort-bar">
      <button class="sort-btn on" data-dsort="date">📅 Date</button>
      <button class="sort-btn" data-dsort="views">👁 Views</button>
      <button class="sort-btn" data-dsort="likes">❤️ Likes</button>
    </div>
    <div class="d-cats-row" id="d-cats">
      <button class="chip on" data-dc="all">All</button>
      <button class="chip" data-dc="gaming">Gaming</button>
      <button class="chip" data-dc="gear">Gear</button>
      <button class="chip" data-dc="tutorial">Tutorial</button>
      <button class="chip" data-dc="review">Review</button>
      <button class="chip" data-dc="lifestyle">Lifestyle</button>
      <button class="chip" data-dc="story">Story</button>
      <button class="chip" data-dc="comedy">Comedy</button>
      <button class="chip" data-dc="education">Education</button>
      <button class="chip" data-dc="series">Series</button>
      <button class="chip" data-dc="challenge">Challenge</button>
      <button class="chip" data-dc="reaction">Reaction</button>
      <button class="chip" data-dc="trend">Trend</button>

    </div>
  </div>

  <!-- Done content -->
  <div id="d-body" class="d-body"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="bnav-btn" href="index.html"><span>💡</span><span>Ideas</span></a>
    <a class="bnav-btn" href="queue.html"><span>📋</span><span>Queue</span></a>
    <a class="bnav-btn" href="production.html"><span>🎬</span><span>Record</span></a>
    <a class="bnav-btn active" href="done.html"><span>✅</span><span>Done</span></a>
    <a class="bnav-btn" href="stats.html"><span>📊</span><span>Stats</span></a>
  </nav>

  <script src="shared.js"></script>
  <script src="data.js"></script>
  <script>
    const KEYS = {
      favs:'sv_favs', done:'sv_done', notes:'sv_notes', pris:'sv_pris',
      scheds:'sv_scheds', custom:'sv_custom', durations:'sv_durations',
      rejected:'sv_rejected', producing:'sv_producing', light:'sv_light',
      vstats:'sv_vstats', streakhist:'sv_streakhist',
    };
    const TC = {
      gaming:   {cls:'tgaming',   l:'Gaming'},
      gear:     {cls:'tgear',     l:'Gear'},
      tutorial: {cls:'ttutorial', l:'Tutorial'},
      review:   {cls:'treview',   l:'Review'},
      lifestyle:{cls:'tlifestyle',l:'Lifestyle'},
      story:    {cls:'tstory',    l:'Story'},
      education:{cls:'teducation',l:'Education'},
      challenge:{cls:'tchallenge',l:'Challenge'},
      reaction: {cls:'treaction', l:'Reaction'},
      trend:    {cls:'ttrend',    l:'Trend'},
      comedy:   {cls:'tcomedy',   l:'Comedy'},
      collab:   {cls:'tcollab',   l:'Collab'},
      series:   {cls:'tseries',   l:'Series'},
    };
    const DUR_LABELS = {quick:'⚡ Quick', medium:'⏳ Medium', full:'🎬 Full day'};

    // State
    let favs = new Set(), done = new Set(), producing = new Set(), rejected = new Set();
    let notes = {}, pris = {}, scheds = {}, durations = {}, customIdeas = [];
    let vstats = {}, streakHistory = [];
    let sortMode = 'date', filterCat = 'all', searchQ = '';

    function getIdea(i) {
      return i < window.ALL_IDEAS.length
        ? window.ALL_IDEAS[i]
        : customIdeas[i - window.ALL_IDEAS.length];
    }

    let _toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    function loadState() {
      try { const v = lsGet(KEYS.favs);       if(v) favs       = new Set(JSON.parse(v)); } catch(e){}
      try { const v = lsGet(KEYS.done);       if(v) done       = new Set(JSON.parse(v)); } catch(e){}
      try { const v = lsGet(KEYS.producing);  if(v) producing  = new Set(JSON.parse(v)); } catch(e){}
      try { const v = lsGet(KEYS.rejected);   if(v) rejected   = new Set(JSON.parse(v)); } catch(e){}
      try { const v = lsGet(KEYS.notes);      if(v) notes      = JSON.parse(v); } catch(e){}
      try { const v = lsGet(KEYS.pris);       if(v) pris       = JSON.parse(v); } catch(e){}
      try { const v = lsGet(KEYS.scheds);     if(v) scheds     = JSON.parse(v); } catch(e){}
      try { const v = lsGet(KEYS.durations);  if(v) durations  = JSON.parse(v); } catch(e){}
      try { const v = lsGet(KEYS.custom);     if(v) customIdeas = JSON.parse(v); } catch(e){}
      try { const v = lsGet(KEYS.vstats);     if(v) vstats     = JSON.parse(v); } catch(e){}
      try { const v = lsGet(KEYS.streakhist); if(v) streakHistory = JSON.parse(v); } catch(e){}
      const lightOn = lsGet(KEYS.light) === '1';
      document.documentElement.classList.toggle('light', lightOn);
    }

    let _saveTimer;
    function saveState() {
      clearTimeout(_saveTimer);
      _saveTimer = setTimeout(_flush, 300);
    }
    function _flush() {
      lsSet(KEYS.done,     JSON.stringify([...done]));
      lsSet(KEYS.producing,JSON.stringify([...producing]));
      lsSet(KEYS.vstats,   JSON.stringify(vstats));
    }
    window.addEventListener('pagehide', () => { clearTimeout(_saveTimer); _flush(); });

    function getVStats(i) {
      if (!vstats[i]) vstats[i] = {views:0, likes:0, comments:0, shares:0, postDate:''};
      return vstats[i];
    }

    function getDoneDate(i) {
      // Look through streakHistory for most recent entry with this id
      const entries = streakHistory.filter(h => h.id === i);
      if (!entries.length) return '';
      const latest = entries[entries.length - 1];
      try {
        return new Date(latest.date + 'T00:00:00').toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
      } catch(e) { return latest.date; }
    }

    function getDoneDateISO(i) {
      const entries = streakHistory.filter(h => h.id === i);
      if (entries.length) return entries[entries.length - 1].date;
      return vstats[i]?.postDate || null;
    }

    function updateHeroStats() {
      const doneArr = [...done];
      const totalDone = doneArr.length;

      let totalViews = 0, totalLikes = 0;
      let bestViews = -1, bestTitle = '—';

      doneArr.forEach(i => {
        const s = vstats[i];
        if (s) {
          totalViews += (s.views || 0);
          totalLikes += (s.likes || 0);
          if ((s.views || 0) > bestViews) {
            bestViews = s.views || 0;
            const idea = getIdea(i);
            if (idea) {
              bestTitle = idea.t.length > 14 ? idea.t.slice(0, 12) + '…' : idea.t;
            }
          }
        }
      });

      document.getElementById('hs-done').textContent  = totalDone;
      document.getElementById('hs-views').textContent = totalViews.toLocaleString();
      document.getElementById('hs-likes').textContent = totalLikes.toLocaleString();
      document.getElementById('hs-best').textContent  = bestViews > 0 ? bestTitle : '—';
    }

    function sortDone(arr) {
      if (sortMode === 'views') {
        return [...arr].sort((a, b) => ((vstats[b]?.views || 0) - (vstats[a]?.views || 0)));
      }
      if (sortMode === 'likes') {
        return [...arr].sort((a, b) => ((vstats[b]?.likes || 0) - (vstats[a]?.likes || 0)));
      }
      // date: use streakHistory date, most recent first
      return [...arr].sort((a, b) => {
        const da = streakHistory.filter(h => h.id === a).slice(-1)[0]?.date || '';
        const db = streakHistory.filter(h => h.id === b).slice(-1)[0]?.date || '';
        return db < da ? -1 : db > da ? 1 : 0;
      });
    }

    function render() {
      const body = document.getElementById('d-body');
      updateHeroStats();

      const doneAll = [...done];

      if (!doneAll.length) {
        body.innerHTML = `<div class="d-empty">
          <div class="d-empty-ico">✅</div>
          <div class="d-empty-title">No completed videos yet</div>
          <p>Finish your first video in Recording to see it here.</p>
          <a class="d-empty-cta" href="production.html">🎬 Go to Recording</a>
        </div>`;
        return;
      }

      // Filter + sort
      const filtered = sortDone(doneAll).filter(i => {
        const idea = getIdea(i);
        if (!idea) return false;
        if (filterCat !== 'all' && !idea.tags.includes(filterCat)) return false;
        if (searchQ && !idea.t.toLowerCase().includes(searchQ)) return false;
        return true;
      });

      if (!filtered.length) {
        body.innerHTML = `<div class="d-empty">
          <div class="d-empty-ico">🔍</div>
          <div class="d-empty-title">No matches</div>
          Try a different search or category filter.
        </div>`;
        return;
      }

      // Group by month (newest first)
      const monthGroups = new Map(); // 'YYYY-MM' -> ids[]
      const ungrouped = [];
      filtered.forEach(i => {
        const iso = getDoneDateISO(i);
        if (iso) {
          const mk = iso.slice(0, 7);
          if (!monthGroups.has(mk)) monthGroups.set(mk, []);
          monthGroups.get(mk).push(i);
        } else {
          ungrouped.push(i);
        }
      });
      const sortedMonths = [...monthGroups.keys()].sort().reverse();

      function cardHTML(i) {
        const idea = getIdea(i);
        if (!idea) return '';
        const tags = idea.tags.map(t => {
          const c = TC[t] || {cls:'tgaming', l:t};
          return `<span class="tag ${c.cls}">${c.l}</span>`;
        }).join('');
        const dateStr = getDoneDate(i);
        const dateHtml = dateStr ? `<div class="d-card-date">Done: ${dateStr}</div>` : '';
        const durHtml  = durations[i] ? `<span class="d-dur-badge ${durations[i]}">${DUR_LABELS[durations[i]] || durations[i]}</span>` : '';
        const schedFormatted = scheds[i] ? (() => {
          try { return new Date(scheds[i] + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric'}); }
          catch(e) { return scheds[i]; }
        })() : '';
        const schedHtml = scheds[i] ? `<span class="d-sched-badge">Sched: ${schedFormatted}</span>` : '';
        const metaHtml  = (durHtml || schedHtml) ? `<div class="d-card-meta">${durHtml}${schedHtml}</div>` : '';
        const s = getVStats(i);
        const totalEngagement = (s.views || 0) + (s.likes || 0) + (s.comments || 0) + (s.shares || 0);
        return `<div class="d-card">
          <div class="d-card-edge"></div>
          <div class="d-card-main">
            <div class="d-card-title">${idea.t}</div>
            <div class="d-card-tags">${tags}</div>
            ${dateHtml}${metaHtml}
            <div class="vstats-grid">
              <div class="vstats-field">
                <label class="vstats-label" for="vs-views-${i}">Views</label>
                <input class="vstats-input" id="vs-views-${i}" type="number" min="0" placeholder="0"
                  value="${s.views || ''}" data-idea-id="${i}" data-field="views">
              </div>
              <div class="vstats-field">
                <label class="vstats-label" for="vs-likes-${i}">Likes</label>
                <input class="vstats-input" id="vs-likes-${i}" type="number" min="0" placeholder="0"
                  value="${s.likes || ''}" data-idea-id="${i}" data-field="likes">
              </div>
              <div class="vstats-field">
                <label class="vstats-label" for="vs-comments-${i}">Comments</label>
                <input class="vstats-input" id="vs-comments-${i}" type="number" min="0" placeholder="0"
                  value="${s.comments || ''}" data-idea-id="${i}" data-field="comments">
              </div>
              <div class="vstats-field">
                <label class="vstats-label" for="vs-shares-${i}">Shares</label>
                <input class="vstats-input" id="vs-shares-${i}" type="number" min="0" placeholder="0"
                  value="${s.shares || ''}" data-idea-id="${i}" data-field="shares">
              </div>
              <div class="vstats-field" style="grid-column:1/-1">
                <label class="vstats-label" for="vs-post-${i}">Posted</label>
                <input class="vstats-input" id="vs-post-${i}" type="date"
                  value="${s.postDate || ''}" data-idea-id="${i}" data-field="postDate">
              </div>
              ${totalEngagement > 0 ? `<div class="vstats-total-row">Total engagement: ${totalEngagement.toLocaleString()}</div>` : ''}
            </div>
            <div class="d-card-actions">
              <button class="d-btn" data-undo="${i}">↩ Undo Done</button>
            </div>
          </div>
        </div>`;
      }

      function monthLabel(mk) {
        try {
          return new Date(mk + '-01T00:00:00').toLocaleDateString('en-US', {month:'long', year:'numeric'});
        } catch(e) { return mk; }
      }

      let html = '';
      const showDividers = filtered.length > 1 && (monthGroups.size > 1 || (monthGroups.size === 1 && ungrouped.length));
      sortedMonths.forEach(mk => {
        const ids = monthGroups.get(mk);
        if (showDividers) {
          html += `<div class="d-month-header"><span>${monthLabel(mk)}</span><span class="d-month-count">${ids.length} video${ids.length > 1 ? 's' : ''}</span></div>`;
        }
        html += ids.map(cardHTML).join('');
      });
      if (ungrouped.length) {
        if (showDividers) {
          html += `<div class="d-month-header"><span>Unknown date</span><span class="d-month-count">${ungrouped.length} video${ungrouped.length > 1 ? 's' : ''}</span></div>`;
        }
        html += ungrouped.map(cardHTML).join('');
      }

      body.innerHTML = html;
    }

    // Stats input handler (event delegation on body)
    document.getElementById('d-body').addEventListener('change', e => {
      const input = e.target.closest('.vstats-input');
      if (!input) return;
      const ideaId = +input.dataset.ideaId;
      const field  = input.dataset.field;
      const s = getVStats(ideaId);
      if (field === 'postDate') {
        s.postDate = input.value;
      } else {
        s[field] = parseInt(input.value, 10) || 0;
      }
      lsSet(KEYS.vstats, JSON.stringify(vstats));
      updateHeroStats();
      // Update the inline total engagement row immediately
      const card = input.closest('.d-card');
      if (card) {
        const total = (s.views||0) + (s.likes||0) + (s.comments||0) + (s.shares||0);
        let totalRow = card.querySelector('.vstats-total-row');
        if (totalRow) {
          if (total > 0) totalRow.textContent = 'Total engagement: ' + total.toLocaleString();
          else totalRow.remove();
        } else if (total > 0) {
          const grid = card.querySelector('.vstats-grid');
          if (grid) {
            totalRow = document.createElement('div');
            totalRow.className = 'vstats-total-row';
            totalRow.style.gridColumn = '1/-1';
            totalRow.textContent = 'Total engagement: ' + total.toLocaleString();
            grid.appendChild(totalRow);
          }
        }
      }
    });

    // Undo done
    document.getElementById('d-body').addEventListener('click', e => {
      const undoBtn = e.target.closest('[data-undo]');
      if (!undoBtn) return;
      const i = +undoBtn.dataset.undo;
      done.delete(i);
      producing.add(i);
      saveState();
      render();
      showToast('Moved back to Recording');
    });

    // Search
    const dSearchEl = document.getElementById('d-search');
    const dClearEl  = document.getElementById('d-clear');
    dSearchEl.addEventListener('input', () => {
      searchQ = dSearchEl.value.trim().toLowerCase();
      dClearEl.style.display = searchQ ? '' : 'none';
      render();
    });
    dClearEl.addEventListener('click', () => {
      searchQ = ''; dSearchEl.value = ''; dClearEl.style.display = 'none'; render();
    });

    // Category chips
    document.getElementById('d-cats').addEventListener('click', e => {
      const btn = e.target.closest('[data-dc]');
      if (!btn) return;
      filterCat = btn.dataset.dc;
      document.querySelectorAll('[data-dc]').forEach(b => b.classList.toggle('on', b.dataset.dc === filterCat));
      render();
    });

    // Sort buttons
    document.querySelectorAll('[data-dsort]').forEach(btn => {
      btn.addEventListener('click', function() {
        sortMode = this.dataset.dsort;
        document.querySelectorAll('[data-dsort]').forEach(b => b.classList.toggle('on', b.dataset.dsort === sortMode));
        render();
      });
    });

    // Theme toggle
    (function() {
      const btn = document.getElementById('d-theme-toggle');
      const lightOn = lsGet(KEYS.light) === '1';
      btn.textContent = lightOn ? '☀' : '🌙';
      btn.addEventListener('click', function() {
        const on = document.documentElement.classList.toggle('light');
        this.textContent = on ? '☀' : '🌙';
        lsSet(KEYS.light, on ? '1' : '0');
      });
    })();

    // Boot
    loadState();
    render();
  </script>
</body>
</html>
