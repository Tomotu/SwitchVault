<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwitchVault — Recording</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="preload" href="data.js" as="script">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%23111110'/%3E%3Crect x='10' y='46' width='42' height='100' rx='21' fill='%23A0453F'/%3E%3Ccircle cx='31' cy='68' r='10' fill='rgba(0,0,0,.3)'/%3E%3Crect x='50' y='20' width='92' height='152' rx='10' fill='%23282523'/%3E%3Crect x='60' y='32' width='72' height='128' rx='6' fill='%23141412'/%3E%3Cpolygon points='80,84 112,96 80,108' fill='%236A8A58' opacity='.9'/%3E%3Crect x='140' y='46' width='42' height='100' rx='21' fill='%236A8A58'/%3E%3Ccircle cx='161' cy='124' r='10' fill='rgba(0,0,0,.3)'/%3E%3C/svg%3E">
  <meta name="theme-color" content="#0E0E0D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ── TOOLBAR ── */
    .p-toolbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--s1); border-bottom: 1px solid var(--b1);
      width: 100%; max-width: 100%;
    }
    .p-toolbar-top {
      padding: 12px clamp(12px,3vw,24px) 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .app-logo { flex-shrink: 0; opacity: .92; display: flex; align-items: center; }
    .p-heading {
      font-family: 'Anton', sans-serif; font-size: 22px;
      font-weight: 400; color: var(--txt); letter-spacing: .02em; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .p-count-badge {
      background: rgba(106,138,88,.12); border: 1px solid rgba(106,138,88,.3);
      border-radius: 20px; color: var(--teal); font-size: 11px; font-weight: 700;
      padding: 2px 10px; white-space: nowrap; flex-shrink: 0;
    }

    /* Progress bar */
    .p-progress {
      background: var(--s1); border-bottom: 1px solid var(--b0);
      padding: 8px clamp(12px,3vw,24px);
      display: flex; align-items: center; gap: 10px;
    }
    .p-prog-track {
      flex: 1; height: 6px; background: var(--b1); border-radius: 3px; overflow: hidden;
    }
    .p-prog-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--teal), var(--blue));
      transition: width .4s ease;
    }
    .p-prog-label { font-size: 11px; color: var(--txt2); white-space: nowrap; }
    .p-prog-label b { color: var(--txt); }

    /* Theme toggle */
    .p-theme-toggle {
      background: none; border: 1px solid var(--b2); border-radius: 6px;
      color: var(--txt2); cursor: pointer; font-size: 14px; padding: 4px 8px;
      transition: all .15s; flex-shrink: 0;
    }
    .p-theme-toggle:hover { background: var(--s3); color: var(--txt); }

    /* ── BODY ── */
    .p-body {
      padding: 20px clamp(12px,3vw,24px) 24px;
      max-width: 720px;
      margin: 0 auto;
      position: relative; z-index: 1;
    }

    /* Cards */
    .p-card {
      background: var(--s2); border: 1px solid var(--b1);
      border-radius: var(--r-lg); margin-bottom: 12px;
      display: flex; overflow: hidden;
      transition: background .12s, border-color .15s, box-shadow .15s, transform .1s;
    }
    .p-card:hover { background: var(--s3); border-color: var(--b2); box-shadow: 0 4px 24px rgba(0,0,0,.22); }
    .p-card:active { transform: scale(.998); }
    .p-card-edge { width: 5px; flex-shrink: 0; background: var(--teal); }
    .p-card-main { flex: 1; padding: 14px 16px 12px; min-width: 0; }
    .p-card-title {
      font-size: 15px; font-weight: 600; color: var(--txt);
      margin-bottom: 8px; line-height: 1.4;
    }
    .p-card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 9px; }
    .p-card-note {
      font-size: 11px; color: var(--txt2); margin-bottom: 9px;
      font-style: italic;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .p-card-meta { display: flex; gap: 6px; align-items: center; margin-bottom: 9px; flex-wrap: wrap; }
    .p-dur-badge {
      font-size: 9px; font-weight: 700; letter-spacing: .05em;
      text-transform: uppercase; border-radius: 4px; padding: 2px 6px; border: 1px solid;
    }
    .p-dur-badge.quick  { color:var(--teal); background:rgba(106,138,88,.1);  border-color:rgba(106,138,88,.25); }
    .p-dur-badge.medium { color:var(--gold); background:rgba(200,168,112,.1); border-color:rgba(200,168,112,.25); }
    .p-dur-badge.full   { color:var(--acc);  background:rgba(160,69,63,.08);  border-color:rgba(160,69,63,.2); }
    .p-sched-badge {
      font-size: 9px; font-weight: 700; letter-spacing: .04em;
      text-transform: uppercase; color: var(--txt2);
      background: var(--s1); border: 1px solid var(--b2);
      border-radius: 4px; padding: 2px 6px;
    }

    /* ── CHECKLIST ── */
    .p-checklist {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: var(--r-lg); padding: 10px 12px; margin-bottom: 10px;
    }
    .p-check-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 0; cursor: pointer; user-select: none;
      border-bottom: 1px solid var(--b0);
    }
    .p-check-item:last-child { border-bottom: none; }
    .p-check-item:hover .p-check-box { border-color: var(--teal); }
    .p-check-box {
      width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0;
      border: 2px solid var(--b2); background: var(--s2);
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; font-size: 11px;
    }
    .p-check-box.checked {
      background: var(--teal); border-color: var(--teal); color: #fff;
    }
    .p-check-label {
      font-size: 13px; color: var(--txt2); transition: color .15s;
    }
    .p-check-item.done-step .p-check-label {
      color: var(--mut); text-decoration: line-through;
    }

    /* Mini progress bar */
    .p-mini-prog { margin-top: 8px; margin-bottom: 4px; }
    .p-mini-prog-track {
      width: 100%; height: 5px; background: var(--b1); border-radius: 3px; overflow: hidden;
    }
    .p-mini-prog-fill {
      height: 100%; border-radius: 3px;
      background: var(--teal);
      transition: width .3s ease;
    }
    .p-mini-prog-fill.all-done { background: #4CAF50; }
    .p-mini-prog-label {
      font-size: 10px; color: var(--txt2); margin-top: 4px; text-align: right;
    }

    .p-card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .p-btn {
      background: var(--s1); border: 1px solid var(--b2); border-radius: 8px;
      color: var(--txt2); cursor: pointer; font-size: 12px; font-weight: 600;
      padding: 7px 15px; white-space: nowrap; transition: all .15s; letter-spacing: .02em;
      font-family: 'Inter', sans-serif;
    }
    .p-btn:hover { background: var(--s3); color: var(--txt); border-color: var(--b3); }
    .p-btn.primary { background:rgba(106,138,88,.13); border-color:rgba(106,138,88,.35); color:var(--teal); font-weight: 700; }
    .p-btn.primary:hover { background:rgba(106,138,88,.22); border-color:rgba(106,138,88,.5); }
    .p-btn:active { filter: brightness(.9); transform: scale(.97); }

    /* Empty state */
    .p-empty {
      text-align: center; color: var(--txt2); font-size: 13px;
      padding: 64px 24px; line-height: 1.9; position: relative; z-index: 1;
    }
    .p-empty-ico { font-size: 44px; margin-bottom: 16px; }
    .p-empty-title { font-size: 16px; font-weight: 600; color: var(--txt); margin-bottom: 8px; }
    .p-empty-cta {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 20px; background: var(--teal); border: none; border-radius: 10px;
      color: #fff; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      padding: 12px 24px; cursor: pointer; text-decoration: none;
      transition: opacity .15s;
    }
    .p-empty-cta:hover { opacity: .85; }

    /* ── BOTTOM NAV ── */
    .bnav-btn.active { color: var(--teal); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--b2); color: var(--txt); border-radius: 20px;
      padding: 8px 18px; font-size: 13px; font-weight: 500;
      pointer-events: none; opacity: 0; visibility: hidden;
      transition: opacity .2s, visibility .2s;
      white-space: nowrap; z-index: 500;
    }
    .toast.show { opacity: 1; visibility: visible; }

    /* ── LIGHT MODE ── */
    html.light .p-check-box { background: var(--s1); }

    /* ── FADE IN ── */
    .p-body, .toast { animation: fadeIn .25s ease both; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .p-toolbar-top { padding: 10px 12px 10px; }
      .p-heading { font-size: 17px; }
      .app-logo { display: none; }
      .p-body { padding: 12px 12px 24px; }
      .p-btn { padding: 9px 14px; font-size: 12px; min-height: 38px; }
      .p-card-main { padding: 12px 14px; }
      .p-card-title { font-size: 13px; }
    }

    @media (min-width: 900px) {
      .p-body { max-width: 1120px; padding-bottom: 80px; }
      .p-toolbar-top, .p-progress { max-width: 1120px; margin: 0 auto; }
      #p-body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        align-items: start;
      }
      #p-body .p-card { margin-bottom: 0; }
      .p-empty { grid-column: 1 / -1; }
    }

  </style>
</head>
<body>

  <!-- Toolbar -->
  <div class="p-toolbar">
    <div class="p-toolbar-top">
      <div class="app-logo" title="SwitchVault">
        <svg viewBox="0 0 40 26" width="30" height="19" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="3" width="11" height="20" rx="5.5" fill="#A0453F"/>
          <circle cx="5.5" cy="9" r="2" fill="rgba(0,0,0,.3)"/>
          <rect x="10" y="0" width="20" height="26" rx="2" fill="#282523"/>
          <rect x="12" y="3" width="16" height="20" rx="1.5" fill="#141412"/>
          <polygon points="17.5,10.5 23.5,13 17.5,15.5" fill="#6A8A58" opacity=".9"/>
          <rect x="29" y="3" width="11" height="20" rx="5.5" fill="#6A8A58"/>
          <circle cx="34.5" cy="17" r="2" fill="rgba(0,0,0,.3)"/>
        </svg>
      </div>
      <h2 class="p-heading">Recording</h2>
      <span class="p-count-badge" id="p-count">0 videos</span>
      <a class="hdr-icon-btn" href="index.html#sync" title="Cloud sync" aria-label="Cloud sync">☁</a>
      <button class="p-theme-toggle" id="p-theme-toggle" title="Toggle light/dark">🌙</button>
    </div>
    <div class="p-progress" id="p-progress" style="display:none">
      <div class="p-prog-track">
        <div class="p-prog-fill" id="p-prog-fill" style="width:0%"></div>
      </div>
      <div class="p-prog-label"><b id="p-prog-done">0</b> of <b id="p-prog-total">0</b> steps complete</div>
    </div>
  </div>

  <!-- Production content -->
  <div id="p-body" class="p-body"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="bnav-btn" href="index.html"><span>💡</span><span>Ideas</span></a>
    <a class="bnav-btn" href="queue.html"><span>📋</span><span>Queue</span></a>
    <a class="bnav-btn active" href="production.html"><span>🎬</span><span>Record</span></a>
    <a class="bnav-btn" href="done.html"><span>✅</span><span>Done</span></a>
    <a class="bnav-btn" href="stats.html"><span>📊</span><span>Stats</span></a>
  </nav>

  <script src="shared.js"></script>
  <script src="data.js"></script>
  <script>
    const KEYS = {
      favs:'sv_favs', done:'sv_done', notes:'sv_notes', pris:'sv_pris',
      scheds:'sv_scheds', custom:'sv_custom', durations:'sv_durations',
      rejected:'sv_rejected', producing:'sv_producing', light:'sv_light',
      checklist:'sv_checklist', streakhist:'sv_streakhist',
    };
    const TC = {
      gaming:   {cls:'tgaming',   l:'Gaming'},
      gear:     {cls:'tgear',     l:'Gear'},
      tutorial: {cls:'ttutorial', l:'Tutorial'},
      review:   {cls:'treview',   l:'Review'},
      lifestyle:{cls:'tlifestyle',l:'Lifestyle'},
      story:    {cls:'tstory',    l:'Story'},
      education:{cls:'teducation',l:'Education'},
      challenge:{cls:'tchallenge',l:'Challenge'},
      reaction: {cls:'treaction', l:'Reaction'},
      trend:    {cls:'ttrend',    l:'Trend'},
      comedy:   {cls:'tcomedy',   l:'Comedy'},
      collab:   {cls:'tcollab',   l:'Collab'},
      series:   {cls:'tseries',   l:'Series'},
    };
    const DUR_LABELS = {quick:'⚡ Quick', medium:'⏳ Medium', full:'🎬 Full day'};
    const STEPS = [
      {key:'script',    label:'Script ready'},
      {key:'filmed',    label:'Filmed'},
      {key:'edited',    label:'Edited'},
      {key:'thumbnail', label:'Thumbnail done'},
      {key:'uploaded',  label:'Uploaded'},
    ];

    // State
    let favs = new Set(), done = new Set(), producing = new Set(), rejected = new Set();
    let notes = {}, pris = {}, scheds = {}, durations = {}, customIdeas = [];
    let checklist = {};

    function getIdea(i) {
      return i < window.ALL_IDEAS.length
        ? window.ALL_IDEAS[i]
        : customIdeas[i - window.ALL_IDEAS.length];
    }

    let _toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    function loadState() {
      try { const v = lsGet(KEYS.favs);      if(v) favs      = new Set(JSON.parse(v)); } catch(e){}
      try { const v = lsGet(KEYS.done);      if(v) done      = new Set(JSON.parse(v)); } catch(e){}
      try { const v = lsGet(KEYS.producing); if(v) producing = new Set(JSON.parse(v)); } catch(e){}
      try { const v = lsGet(KEYS.rejected);  if(v) rejected  = new Set(JSON.parse(v)); } catch(e){}
      try { const v = lsGet(KEYS.notes);     if(v) notes     = JSON.parse(v); } catch(e){}
      try { const v = lsGet(KEYS.pris);      if(v) pris      = JSON.parse(v); } catch(e){}
      try { const v = lsGet(KEYS.scheds);    if(v) scheds    = JSON.parse(v); } catch(e){}
      try { const v = lsGet(KEYS.durations); if(v) durations = JSON.parse(v); } catch(e){}
      try { const v = lsGet(KEYS.custom);    if(v) customIdeas = JSON.parse(v); } catch(e){}
      try { const v = lsGet(KEYS.checklist); if(v) checklist = JSON.parse(v); } catch(e){}
      const lightOn = lsGet(KEYS.light) === '1';
      document.documentElement.classList.toggle('light', lightOn);
    }

    let _saveTimer;
    function saveState() {
      clearTimeout(_saveTimer);
      _saveTimer = setTimeout(_flush, 300);
    }
    function _flush() {
      lsSet(KEYS.favs,      JSON.stringify([...favs]));
      lsSet(KEYS.done,      JSON.stringify([...done]));
      lsSet(KEYS.producing, JSON.stringify([...producing]));
      lsSet(KEYS.checklist, JSON.stringify(checklist));
    }
    window.addEventListener('pagehide', () => { clearTimeout(_saveTimer); _flush(); });

    function getChecklist(i) {
      if (!checklist[i]) {
        checklist[i] = {script:false, filmed:false, edited:false, thumbnail:false, uploaded:false};
      }
      return checklist[i];
    }

    function stepsDone(i) {
      const cl = getChecklist(i);
      return STEPS.filter(s => cl[s.key]).length;
    }

    function updateProgressBar() {
      const ids = [...producing].filter(i => !done.has(i));
      const total = ids.length * STEPS.length;
      const completed = ids.reduce((acc, i) => acc + stepsDone(i), 0);
      const progEl = document.getElementById('p-progress');
      if (ids.length > 0) {
        progEl.style.display = '';
        document.getElementById('p-prog-done').textContent = completed;
        document.getElementById('p-prog-total').textContent = total;
        const pct = total > 0 ? Math.round(completed / total * 100) : 0;
        document.getElementById('p-prog-fill').style.width = pct + '%';
      } else {
        progEl.style.display = 'none';
      }
    }

    function render() {
      const body = document.getElementById('p-body');
      const prodAll = [...producing].filter(i => !done.has(i));

      const countEl = document.getElementById('p-count');
      countEl.textContent = prodAll.length === 1 ? '1 video' : prodAll.length + ' videos';

      updateProgressBar();

      if (!prodAll.length) {
        body.innerHTML = `<div class="p-empty">
          <div class="p-empty-ico">🎬</div>
          <div class="p-empty-title">Nothing recording yet</div>
          <p>Head to Queue and start filming something!</p>
          <a class="p-empty-cta" href="queue.html">📋 Go to Queue</a>
        </div>`;
        return;
      }

      let html = '';
      prodAll.forEach(i => {
        const idea = getIdea(i);
        if (!idea) return;

        const tags = idea.tags.map(t => {
          const c = TC[t] || {cls:'tgaming', l:t};
          return `<span class="tag ${c.cls}">${c.l}</span>`;
        }).join('');

        const noteHtml = notes[i] ? `<div class="p-card-note">${notes[i]}</div>` : '';
        const durHtml  = durations[i] ? `<span class="p-dur-badge ${durations[i]}">${DUR_LABELS[durations[i]] || durations[i]}</span>` : '';
        const schedFormatted = scheds[i] ? (() => {
          try { return new Date(scheds[i] + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric'}); }
          catch(e) { return scheds[i]; }
        })() : '';
        const schedHtml = scheds[i] ? `<span class="p-sched-badge">Sched: ${schedFormatted}</span>` : '';
        const metaHtml  = (durHtml || schedHtml) ? `<div class="p-card-meta">${durHtml}${schedHtml}</div>` : '';

        const priLabel = pris[i] === 'h' ? '<span style="margin-right:5px">🔴</span>' : pris[i] === 'm' ? '<span style="margin-right:5px">🟡</span>' : '';
        const titleHtml = `${priLabel}${idea.t}`;

        const cl = getChecklist(i);
        const doneCount = STEPS.filter(s => cl[s.key]).length;
        const totalSteps = STEPS.length;
        const pct = Math.round(doneCount / totalSteps * 100);
        const allDone = doneCount === totalSteps;

        const checkItems = STEPS.map(s => `
          <div class="p-check-item${cl[s.key] ? ' done-step' : ''}" data-toggle="${i}" data-step="${s.key}">
            <div class="p-check-box${cl[s.key] ? ' checked' : ''}">${cl[s.key] ? '✓' : ''}</div>
            <span class="p-check-label">${s.label}</span>
          </div>`).join('');

        html += `<div class="p-card" id="pcard-${i}">
          <div class="p-card-edge"></div>
          <div class="p-card-main">
            <div class="p-card-title">${titleHtml}</div>
            <div class="p-card-tags">${tags}</div>
            ${noteHtml}${metaHtml}
            <div class="p-checklist">${checkItems}</div>
            <div class="p-mini-prog">
              <div class="p-mini-prog-track">
                <div class="p-mini-prog-fill${allDone ? ' all-done' : ''}" style="width:${pct}%"></div>
              </div>
              <div class="p-mini-prog-label">${doneCount} / ${totalSteps} steps</div>
            </div>
            <div class="p-card-actions">
              <button class="p-btn primary" data-finish="${i}">✓ Mark Done</button>
              <button class="p-btn" data-back="${i}">← Back to Queue</button>
            </div>
          </div>
        </div>`;
      });

      body.innerHTML = html;
    }

    // Toggle checklist step without full re-render
    function toggleStep(ideaId, stepKey) {
      const cl = getChecklist(ideaId);
      cl[stepKey] = !cl[stepKey];
      lsSet(KEYS.checklist, JSON.stringify(checklist));

      // Update the UI for this card only
      const card = document.getElementById('pcard-' + ideaId);
      if (!card) return;

      const item = card.querySelector(`[data-toggle="${ideaId}"][data-step="${stepKey}"]`);
      if (item) {
        const box = item.querySelector('.p-check-box');
        const isChecked = cl[stepKey];
        box.className = 'p-check-box' + (isChecked ? ' checked' : '');
        box.textContent = isChecked ? '✓' : '';
        item.className = 'p-check-item' + (isChecked ? ' done-step' : '');
      }

      // Update mini progress bar
      const doneCount = stepsDone(ideaId);
      const totalSteps = STEPS.length;
      const pct = Math.round(doneCount / totalSteps * 100);
      const allDone = doneCount === totalSteps;
      const fillEl = card.querySelector('.p-mini-prog-fill');
      const labelEl = card.querySelector('.p-mini-prog-label');
      if (fillEl) {
        fillEl.style.width = pct + '%';
        fillEl.className = 'p-mini-prog-fill' + (allDone ? ' all-done' : '');
      }
      if (labelEl) labelEl.textContent = doneCount + ' / ' + totalSteps + ' steps';

      updateProgressBar();
    }

    // Event delegation
    document.getElementById('p-body').addEventListener('click', e => {
      const toggleEl = e.target.closest('[data-toggle]');
      const finishBtn = e.target.closest('[data-finish]');
      const backBtn   = e.target.closest('[data-back]');

      if (toggleEl && !finishBtn && !backBtn) {
        const i    = +toggleEl.dataset.toggle;
        const step = toggleEl.dataset.step;
        toggleStep(i, step);
        return;
      }

      if (finishBtn) {
        const i = +finishBtn.dataset.finish;
        producing.delete(i);
        done.add(i);
        // record streak history
        const today = new Date().toISOString().slice(0,10);
        try {
          let hist = JSON.parse(lsGet(KEYS.streakhist) || '[]');
          hist.push({date: today, id: i});
          lsSet(KEYS.streakhist, JSON.stringify(hist));
        } catch(e){}
        saveState();
        render();
        showToast('🎉 Video marked done!');
        return;
      }

      if (backBtn) {
        const i = +backBtn.dataset.back;
        producing.delete(i);
        saveState();
        render();
        showToast('Moved back to Queue');
        return;
      }
    });

    // Theme toggle
    (function() {
      const btn = document.getElementById('p-theme-toggle');
      const lightOn = lsGet(KEYS.light) === '1';
      btn.textContent = lightOn ? '☀' : '🌙';
      btn.addEventListener('click', function() {
        const on = document.documentElement.classList.toggle('light');
        this.textContent = on ? '☀' : '🌙';
        lsSet(KEYS.light, on ? '1' : '0');
      });
    })();

    // Boot
    loadState();
    render();
  </script>
</body>
</html>
